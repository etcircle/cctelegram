name: Check
on:
  push:
  pull_request:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: "0000000000:ci-dummy-token"
      ALLOWED_USERS: "12345"
      PYTHON_DOTENV_DISABLED: "1"
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set CC_TELEGRAM_DIR
        run: echo "CC_TELEGRAM_DIR=$RUNNER_TEMP/cc-telegram-config" >> "$GITHUB_ENV"
      - run: uv sync --all-extras
      - name: Formatter
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/
      - name: Lint
        run: uv run pyright src/cctelegram/
      - name: Test
        run: uv run pytest --tb=short -q
